name: Compilar Ejecutable Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Usamos Windows para poder compilar el .exe correctamente
    runs-on: windows-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar dependencias
      run: |
        if (Test-Path package.json) {
          npm install
        }

    - name: Instalar empaquetador globalmente
      run: npm install -g pkg

    - name: Compilar aplicacion a .exe
      run: |
        # Aquí usamos 'pkg' para empaquetar tu archivo main.js. 
        # Si usas otra herramienta en tus scripts, puedes cambiar este comando por: npm run build
        pkg main.js --targets node20-win-x64 --output dist/MiAplicacion.exe

    - name: Subir el archivo .exe como Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aplicacion-Windows-EXE
        path: dist/MiAplicacion.exe
